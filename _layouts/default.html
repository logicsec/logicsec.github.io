<!doctype html>
<html class="no-js" lang="">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>	
    <meta name="description" content="{{ site.description }}">	
    <meta name="HandheldFriendly" content="True" />
    <meta name="MobileOptimized" content="320" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />	
    <meta name="generator" content="Jekyll v{{ jekyll.version }}">	
    <link rel="shortcut icon" href="{{ "/favicon.png" | prepend: site.baseurl }}">
    <link rel="prefetch" href="{{ site.url }}">	
	<link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,600,700,800" rel="stylesheet">
    <!-- Font-Awesome CSS -->
    <link rel="stylesheet" href="{{site.baseurl}}/assets/css/font-awesome.min.css">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{{site.baseurl}}/assets/css/bootstrap.min.css">
    <!-- Owl Carousel -->
    <link rel="stylesheet" href="{{site.baseurl}}/assets/css/owl.carousel.min.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="{{site.baseurl}}/assets/css/style.css">
    <!-- Responsive CSS -->
    <link rel="stylesheet" href="{{site.baseurl}}/assets/css/responsive.css">
</head>

<body>

        <div class="row">

                <div class="col-md-6 col-md-offset-3">

                        <h1>{% if page.custom_page_title %}{{page.custom_page_title}} {% else %} {{page.title}} {% endif %}</h1>

    </div> -->
    <!-- End Slider -->

	{{ content }}
	
    {% include footer.html %}

    <a href="#" class="go-top"><i class="fa fa-angle-up"></i></a>

     <!-- jquery -->
    <script src="{{site.baseurl}}/assets/js/jquery-1.12.4.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="{{site.baseurl}}/assets/js/bootstrap.min.js"></script>

    <!-- For Tweeter Feed -->
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

    <!-- Instagram Image -->
    <script src="{{site.baseurl}}/assets/js/instafeed.min.js"></script>

    <!-- Owl Carousel -->
    <script src="{{site.baseurl}}/assets/js/owl.carousel.min.js"></script>

    <!-- jQuery Easing -->
    <script src="{{site.baseurl}}/assets/js/jquery.easing.js"></script>

    <!-- Main JS -->
    <script src="{{site.baseurl}}/assets/js/main.js"></script>
    <script type="text/javascript">
      var config = {
        'disqus_shortname': '{{ site.theme_disqus_shortname }}',
        'analytics_id': '{{ site.theme_analytics_id }}',
        'analytics_domain': '{{ site.theme_analytics_domain }}',		
 
      };

      $(document).ready(function() {
			// Show or hide the sticky footer button
			$(window).scroll(function() {
				if ($(this).scrollTop() > 200) {
					$('.go-top').fadeIn(200);
				} else {
					$('.go-top').fadeOut(200);
				}
			});
			
			// Animate the scroll to top
			$('.go-top').click(function(event) {
				event.preventDefault();
				
				$('html, body').animate({scrollTop: 0}, 300);
			})
		});
 
    </script>

	
</body>

</html>
